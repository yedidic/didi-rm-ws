<!doctype html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#f4efe6">
    <meta name="description" content="Didi Cohen — Rosen Method Bodywork intern and Kundalini Yoga teacher in Rehavia, Jerusalem.">
    <meta property="og:type" content="website">
    <meta property="og:title" content="Didi Cohen | Rosen Method &amp; Kundalini Yoga">
    <meta property="og:description" content="A quiet space for body awareness, movement and meeting yourself.">
    <meta property="og:image" content="images/hero-room.jpg">
    <link rel="canonical" href="https://example.com/">
    <link rel="icon" href="images/rm-logo.svg?v=1" type="image/svg+xml" sizes="any">
    <link rel="shortcut icon" href="images/rm-logo.svg?v=1" type="image/svg+xml">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <title>Didi Cohen | Rosen Method &amp; Kundalini Yoga</title>
    <script type="application/ld+json" id="structured-data">{}</script>
    <script src="script.js" defer></script>
  </head>
  <body>
    <a class="skip-link" href="#main" data-i18n="a11y.skip"></a>

    <header class="site-header" id="top">
      <div class="shell header-inner">
        <a class="brand" href="#top" aria-label="" data-i18n-aria="brand.aria">
          <img class="brand-mark" src="images/rm-logo.svg" alt="" aria-hidden="true">
          <span class="brand-copy">
            <strong data-i18n="brand.name"></strong>
            <small data-i18n="brand.role"></small>
          </span>
        </a>

        <button class="menu-toggle icon-button" type="button" aria-expanded="false" aria-controls="primary-navigation" data-i18n-aria="nav.openMenu">
          <span></span><span></span><span></span>
        </button>

        <nav class="primary-nav" id="primary-navigation" aria-label="" data-i18n-aria="nav.aria">
          <a href="#about" data-i18n="nav.about"></a>
          <div class="nav-group">
            <button class="nav-submenu-toggle" type="button" aria-expanded="false" aria-controls="services-menu">
              <span data-i18n="nav.working"></span>
              <span aria-hidden="true">⌄</span>
            </button>
            <div class="submenu" id="services-menu">
              <a href="#rosen" data-i18n="nav.rosen"></a>
              <a href="#yoga" data-i18n="nav.yoga"></a>
            </div>
          </div>
          <a href="#testimonials" data-i18n="nav.testimonials"></a>
          <a href="#contact" data-i18n="nav.contact"></a>
        </nav>

        <button class="language-switch" type="button" data-language-switch data-i18n="language.switch" data-i18n-aria="language.aria"></button>
      </div>
    </header>

    <main id="main">
      <section class="hero" aria-labelledby="hero-title">
        <img class="hero-image" src="images/hero-room.jpg" alt="" data-i18n-alt="images.heroAlt">
        <div class="hero-scrim"></div>
        <div class="shell hero-inner">
          <div class="hero-card reveal">
            <p class="eyebrow" data-i18n="hero.eyebrow"></p>
            <h1 id="hero-title" data-i18n="hero.title"></h1>
            <p class="hero-intro" data-i18n="hero.intro"></p>
            <div class="button-row">
              <a class="button button-primary" href="#contact" data-i18n="hero.primaryCta"></a>
              <a class="button button-quiet" href="#working-together" data-i18n="hero.secondaryCta"></a>
            </div>
          </div>
        </div>
        <a class="scroll-cue" href="#intro" aria-label="" data-i18n-aria="hero.scrollAria"><span aria-hidden="true">↓</span></a>
      </section>

      <section class="intro section" id="intro" aria-labelledby="intro-title">
        <div class="shell narrow centered reveal">
          <p class="eyebrow" data-i18n="intro.eyebrow"></p>
          <h2 id="intro-title" data-i18n="intro.title"></h2>
          <p class="lead" data-i18n="intro.body"></p>
        </div>
      </section>

      <section class="about section" id="about" aria-labelledby="about-title">
        <div class="shell about-grid">
          <div class="about-visual reveal">
            <img class="about-portrait" src="images/didi.jpg" alt="" data-i18n-alt="images.didiAlt" loading="lazy">
            <div class="organic-line"></div>
          </div>
          <div class="about-copy reveal">
            <p class="eyebrow" data-i18n="about.eyebrow"></p>
            <h2 id="about-title" data-i18n="about.title"></h2>
            <p class="lead" data-i18n="about.lead"></p>
            <p data-i18n="about.body1"></p>
            <p data-i18n="about.body2"></p>
            <ul class="credentials" aria-label="" data-i18n-aria="about.credentialsAria">
              <li data-i18n="about.credential1"></li>
              <li data-i18n="about.credential2"></li>
              <li data-i18n="about.credential3"></li>
            </ul>
          </div>
        </div>
      </section>

      <section class="services section" id="working-together" aria-labelledby="services-title">
        <div class="shell">
          <header class="section-heading reveal">
            <p class="eyebrow" data-i18n="services.eyebrow"></p>
            <h2 id="services-title" data-i18n="services.title"></h2>
            <p class="lead" data-i18n="services.intro"></p>
          </header>

          <article class="service-row reveal" id="rosen">
            <div class="service-image rosen-image">
              <img src="images/hero-room.jpg" alt="" data-i18n-alt="images.rosenAlt" loading="lazy">
            </div>
            <div class="service-copy">
              <span class="service-number" aria-hidden="true">01</span>
              <h3 data-i18n="services.rosen.title"></h3>
              <p class="lead" data-i18n="services.rosen.lead"></p>
              <p data-i18n="services.rosen.body"></p>
              <div class="session-note">
                <strong data-i18n="services.rosen.noteTitle"></strong>
                <span data-i18n="services.rosen.note"></span>
              </div>
              <a class="text-link" href="#contact"><span data-i18n="services.cta"></span><span aria-hidden="true">↗</span></a>
            </div>
          </article>

          <article class="service-row service-row-reverse reveal" id="yoga">
            <div class="service-image">
              <img src="images/yoga-studio.jpg" alt="" data-i18n-alt="images.yogaAlt" loading="lazy">
            </div>
            <div class="service-copy">
              <span class="service-number" aria-hidden="true">02</span>
              <h3 data-i18n="services.yoga.title"></h3>
              <p class="lead" data-i18n="services.yoga.lead"></p>
              <p data-i18n="services.yoga.body"></p>
              <div class="session-note">
                <strong data-i18n="services.yoga.noteTitle"></strong>
                <span data-i18n="services.yoga.note"></span>
              </div>
              <a class="text-link" href="#contact"><span data-i18n="services.cta"></span><span aria-hidden="true">↗</span></a>
            </div>
          </article>
        </div>
      </section>

      <section class="testimonials section" id="testimonials" aria-labelledby="testimonials-title">
        <div class="shell">
          <header class="section-heading centered reveal">
            <p class="eyebrow" data-i18n="testimonials.eyebrow"></p>
            <h2 id="testimonials-title" data-i18n="testimonials.title"></h2>
            <p data-i18n="testimonials.placeholderNote"></p>
          </header>
          <div class="quote-grid">
            <figure class="quote-card reveal">
              <span class="quote-mark" aria-hidden="true">“</span>
              <blockquote data-i18n="testimonials.card1.quote"></blockquote>
              <figcaption data-i18n="testimonials.card1.author"></figcaption>
            </figure>
            <figure class="quote-card reveal">
              <span class="quote-mark" aria-hidden="true">“</span>
              <blockquote data-i18n="testimonials.card2.quote"></blockquote>
              <figcaption data-i18n="testimonials.card2.author"></figcaption>
            </figure>
          </div>
        </div>
      </section>

      <section class="contact section" id="contact" aria-labelledby="contact-title">
        <div class="shell contact-grid">
          <div class="contact-copy reveal">
            <p class="eyebrow" data-i18n="contact.eyebrow"></p>
            <h2 id="contact-title" data-i18n="contact.title"></h2>
            <p class="lead" data-i18n="contact.body"></p>
            <p class="location"><span aria-hidden="true">⌖</span><span data-i18n="contact.location"></span></p>
          </div>
          <div class="contact-links reveal">
            <a data-contact="whatsapp" href="#">
              <span><small data-i18n="contact.whatsappLabel"></small><strong data-i18n="contact.whatsappValue"></strong></span><span aria-hidden="true">↗</span>
            </a>
            <a data-contact="phone" href="#">
              <span><small data-i18n="contact.phoneLabel"></small><strong data-i18n="contact.phoneValue"></strong></span><span aria-hidden="true">↗</span>
            </a>
            <a data-contact="email" href="#">
              <span><small data-i18n="contact.emailLabel"></small><strong data-i18n="contact.emailValue"></strong></span><span aria-hidden="true">↗</span>
            </a>
            <a data-contact="instagram" href="#">
              <span><small data-i18n="contact.instagramLabel"></small><strong data-i18n="contact.instagramValue"></strong></span><span aria-hidden="true">↗</span>
            </a>
          </div>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <div class="shell footer-main">
        <div><strong data-i18n="brand.name"></strong><p data-i18n="footer.status"></p></div>
        <a href="#top" class="back-top"><span data-i18n="footer.backTop"></span><span aria-hidden="true">↑</span></a>
      </div>
      <div class="shell footer-meta">
        <span data-i18n="footer.copyright"></span>
        <div>
          <span data-i18n="footer.location"></span>
          <span aria-hidden="true">·</span>
          <span data-i18n="footer.storageNotice"></span>
        </div>
      </div>
    </footer>

    <button class="a11y-trigger floating-control" type="button" aria-expanded="false" aria-controls="a11y-panel" data-i18n-aria="a11y.openToolbar">
      <span aria-hidden="true">Aa</span>
    </button>
    <aside class="a11y-panel" id="a11y-panel" hidden aria-labelledby="a11y-title">
      <div class="panel-header"><h2 id="a11y-title" data-i18n="a11y.title"></h2><button class="panel-close" type="button" data-a11y-close data-i18n-aria="a11y.close">×</button></div>
      <div class="a11y-controls">
        <button type="button" data-a11y-action="font-up"><span aria-hidden="true">A+</span><span data-i18n="a11y.fontUp"></span></button>
        <button type="button" data-a11y-action="font-down"><span aria-hidden="true">A−</span><span data-i18n="a11y.fontDown"></span></button>
        <button type="button" data-a11y-action="contrast" aria-pressed="false"><span aria-hidden="true">◐</span><span data-i18n="a11y.contrast"></span></button>
        <button type="button" data-a11y-action="links" aria-pressed="false"><span aria-hidden="true">_</span><span data-i18n="a11y.links"></span></button>
        <button type="button" data-a11y-action="motion" aria-pressed="false"><span aria-hidden="true">Ⅱ</span><span data-i18n="a11y.motion"></span></button>
        <button type="button" data-a11y-action="reset"><span aria-hidden="true">↺</span><span data-i18n="a11y.reset"></span></button>
      </div>
      <p class="panel-note" data-i18n="a11y.note"></p>
    </aside>

    <div class="live-region" aria-live="polite" aria-atomic="true"></div>
  </body>
</html>
